# Railway / Nixpacks config — explicit SPA-aware production serve so direct
# hits on client-side routes (e.g. /reset-password?token=…) render the React
# app's index.html instead of falling through to the home page or a 404.
#
# Why `serve -s`?
#   The `-s` flag tells `serve` to treat this as a single-page app and rewrite
#   every unknown route to /index.html. Without it, requests like
#   /reset-password return 404 → which Railway's edge often masks as `/`.
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "yarn"]

[phases.install]
cmds = ["yarn install --frozen-lockfile"]

[phases.build]
cmds = ["yarn build"]

[start]
cmd = "yarn start:prod"
